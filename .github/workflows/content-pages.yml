name: Content Pages

on:
  push:
    branches: [main]
    paths:
      - "deploy/business-web/**"
      - ".github/workflows/content-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          install-bun: "false"
          install-deps: "false"
          use-sticky-disk: "false"

      - name: Build public content site
        env:
          PUBLIC_BASE_URL: ${{ vars.OPENCLAW_PUBLIC_BASE_URL || steps.pages.outputs.base_url }}
          PUBLIC_CUSTOM_DOMAIN: ${{ vars.OPENCLAW_PUBLIC_CUSTOM_DOMAIN }}
        run: ./deploy/business-web/publish-content.sh

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: deploy/business-web/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
